<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TabSort for YouTube</title>
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <main>
        <header>
            <div id="headerContainer">
              <h1>TabSort for YouTube</h1>
              <div class="header-actions">
                <button id="sortButton" class="action-button hide">Sort Tabs</button>
                <div id="sortedBadge" class="tabs-sorted hide">Tabs sorted</div>
              </div>
          </div>
          <div id="headerBorder"></div>
        </header>
        <section>
            <div id="popupError" class="message-banner error-message hide" role="alert"></div>
            <h2>YouTube tabs</h2>
            <table id="tabsTable">
              <thead>
                <tr>
                    <th class="video-title-url">Video</th>
                    <th class="next-step">Next Step</th>
                    <th class="remaining-time">Remaining Time</th>
                    <th class="tab-index">Position</th>
                    <th class="load-state">Load State</th>
                </tr>
              </thead>
                <tbody></tbody>
            </table>
        </section>
        <footer>
            <div id="controls">
                <div id="sortStatus" class="status-message"></div>
                <label class="option-toggle hide">
                    <input type="checkbox" id="groupOtherTabsToggle">
                    Group other tabs by site
                </label>
            </div>
        </footer>
    </main>
    <script type="module" src="popup-controller.js"></script>
</body>
</html>
